services:
  - type: web
    name: edgeshield-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: edgeshield-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "8000"
      - key: JWT_SECRET
        value: "generate_a_secure_random_key_here"
